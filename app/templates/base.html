<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CostTracker{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f5f3; }
        .navbar-costtracker { background-color: #1a1a1a; }
        .nav-link-ct {
            color: #aaa !important;
            font-size: 14px;
            padding: 6px 12px !important;
            border-radius: 6px;
            transition: all 0.15s;
        }
        .nav-link-ct:hover { color: #fff !important; background: #2a2a2a; }
        .nav-link-ct.active { color: #fff !important; border-bottom: 2px solid #f5a623; border-radius: 0; }
        .brand-ct { color: #f5a623 !important; font-weight: 600; font-size: 16px; }
        .main-container { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
        .stat-card {
            background: #fff;
            border-radius: 10px;
            border: 0.5px solid #e0e0e0;
            padding: 1.2rem;
        }
        .stat-card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
        .stat-card .value { font-size: 26px; font-weight: 600; color: #1a1a1a; }
        .card-ct {
            background: #fff;
            border-radius: 12px;
            border: 0.5px solid #e0e0e0;
            padding: 1.25rem;
        }
        .badge-active { background: #eaf3de; color: #3b6d11; font-size: 11px; padding: 3px 10px; border-radius: 20px; }
        .badge-completed { background: #f1efe8; color: #5f5e5a; font-size: 11px; padding: 3px 10px; border-radius: 20px; }
        .btn-primary-ct {
            background: #f5a623;
            border: none;
            color: #1a1a1a;
            font-weight: 600;
            border-radius: 8px;
            padding: 8px 18px;
        }
        .btn-primary-ct:hover { background: #e09510; color: #1a1a1a; }
        .user-pill {
            background: #2a2a2a;
            color: #ccc;
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-costtracker navbar-expand-lg">
        <div class="container" style="max-width: 1100px;">
            <a class="navbar-brand brand-ct" href="/">
                <i class="bi bi-building-fill"></i> CostTracker
            </a>
            {% if current_user.is_authenticated %}
            <div class="d-flex align-items-center gap-2">
                <a href="{{ url_for('main.dashboard') }}"
                   class="nav-link-ct {% if request.endpoint == 'main.dashboard' %}active{% endif %}">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
                <a href="{{ url_for('main.projects') }}"
                   class="nav-link-ct {% if request.endpoint in ['main.projects', 'main.project_detail', 'main.new_project'] %}active{% endif %}">
                    <i class="bi bi-folder2"></i> Projects
                </a>
            </div>
            <div class="d-flex align-items-center gap-3 ms-auto">
                <span class="user-pill">
                    <i class="bi bi-person-circle"></i> {{ current_user.username }}
                </span>
                <a href="{{ url_for('main.logout') }}" class="nav-link-ct">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            </div>
            {% endif %}
        </div>
    </nav>
    <div class="main-container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
